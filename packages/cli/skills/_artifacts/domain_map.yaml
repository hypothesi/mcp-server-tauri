library:
  name: '@hypothesi/tauri-mcp-cli'
  version: '0.9.0'
  repository: 'https://github.com/hypothesi/mcp-server-tauri'
  description: 'CLI wrapper that exposes Tauri MCP server tools as terminal commands, primarily for AI coding agents automating Tauri app development workflows.'
  primary_framework: 'framework-agnostic'

domains:
  - name: 'Session and daemon management'
