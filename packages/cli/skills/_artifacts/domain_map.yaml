    description: 'Starting, stopping, and recovering the driver session and background keep-alive daemon.'
  - name: 'UI interaction'
    slug: 'ui-interaction'
    description: 'Clicking, typing, scrolling, gestures, and waiting for elements in the Tauri webview.'
  - name: 'Inspection and capture'
    slug: 'inspection-capture'
    description: 'Taking screenshots, running JavaScript, reading logs, finding elements, and inspecting styles.'
  - name: 'Backend and IPC'
    slug: 'backend-ipc'
    description: 'Executing Tauri IPC commands, monitoring IPC traffic, emitting events, and reading backend state.'
  - name: 'Mobile and remote devices'
    slug: 'mobile-remote'
    description: 'Listing Android and iOS devices, connecting to real devices, and reading platform logs.'

skills:
  - name: 'Tauri MCP CLI'
    slug: 'tauri-mcp-cli'
    domain: 'all'
    description: 'Single bundled skill covering the full Tauri MCP CLI workflow from session startup through UI automation, IPC debugging, inspection, and mobile workflows.'
    type: 'core'
    covers:
      - 'driver-session start/stop/status'
      - 'daemon start/stop/restart/status'
      - 'webview-interact, webview-keyboard, webview-wait-for'
      - 'webview-screenshot, webview-execute-js, webview-find-element, webview-get-styles'
      - 'read-logs, manage-window'
      - 'ipc-execute-command, ipc-monitor, ipc-get-captured, ipc-emit-event, ipc-get-backend-state'
      - 'list-devices and remote/mobile connection workflows'
    tasks:
      - 'Start an automation session before running tools'
      - 'Interact with the Tauri webview'
      - 'Capture screenshots and inspect runtime state'
      - 'Debug backend communication through IPC'
      - 'Connect to simulators, emulators, and real devices'
    failure_modes:
      - mistake: 'Call automation tools without starting a session first'
        mechanism: 'Most tools fail immediately with a no-active-session error'
        wrong_pattern: |
          tauri-mcp webview-screenshot --file shot.png
        correct_pattern: |
          tauri-mcp driver-session start --port 9223
          tauri-mcp driver-session status --json
          tauri-mcp webview-screenshot --file shot.png
        source: 'packages/cli/src/index.ts'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['tauri-mcp-cli']
      - mistake: 'Assume driver-session start proves a live connection'
        mechanism: 'The command can return successfully even when no app is reachable'
        wrong_pattern: |
          tauri-mcp driver-session start --port 9223
          tauri-mcp webview-interact --action click --selector "#submit"
        correct_pattern: |
          tauri-mcp driver-session start --port 9223
          tauri-mcp driver-session status --json
        source: 'docs/guides/cli.md'
        priority: 'HIGH'
        status: 'active'
        skills: ['tauri-mcp-cli']
      - mistake: 'Use camelCase flags instead of kebab-case'
        mechanism: 'Commander ignores unknown flags, so commands run without the intended option'
        wrong_pattern: |
          tauri-mcp webview-interact --action click --windowId settings
        correct_pattern: |
          tauri-mcp webview-interact --action click --window-id settings
        source: 'packages/cli/src/index.ts'
        priority: 'HIGH'
        status: 'active'
        skills: ['tauri-mcp-cli']
      - mistake: 'Expect screenshot image bytes on stdout'
        mechanism: 'The CLI writes images to disk and returns a file path summary or JSON metadata'
        wrong_pattern: |
          IMG=$(tauri-mcp webview-screenshot)
        correct_pattern: |
          tauri-mcp webview-screenshot --file shot.png
        source: 'packages/cli/src/index.ts'
        priority: 'HIGH'
        status: 'active'
        skills: ['tauri-mcp-cli']
      - mistake: 'Use IPC tools without an active bridge plugin'
        mechanism: 'IPC commands require tauri-plugin-mcp-bridge, even if the session can otherwise connect'
        wrong_pattern: |
          tauri-mcp ipc-get-backend-state --json
        correct_pattern: |
          tauri-mcp driver-session status --json
          tauri-mcp ipc-get-backend-state --json
        source: 'docs/api/ipc-plugin.md'
        priority: 'HIGH'
        status: 'active'
        skills: ['tauri-mcp-cli']
      - mistake: 'Connect to a real Android device without adb reverse or --host'
        mechanism: 'Real devices do not expose the bridge on localhost from the development machine'
        wrong_pattern: |
          tauri-mcp driver-session start --port 9223
        correct_pattern: |
          adb reverse tcp:9223 tcp:9223
          tauri-mcp driver-session start --port 9223
        source: 'docs/api/mobile-development.md'
        priority: 'HIGH'
        status: 'active'
        skills: ['tauri-mcp-cli']
      - mistake: 'Omit --selector for webview-keyboard type actions'
        mechanism: 'The CLI needs a target element to focus before typing'
        wrong_pattern: |
          tauri-mcp webview-keyboard --action type --text "hello"
        correct_pattern: |
          tauri-mcp webview-keyboard --action type --selector "#email" --text "hello"
        source: 'docs/api/webview-interaction.md'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['tauri-mcp-cli']
      - mistake: 'Return a bare function from webview-execute-js'
        mechanism: 'Bare function expressions serialize to null'
        wrong_pattern: |
          tauri-mcp webview-execute-js --script "() => { return document.title; }"
        correct_pattern: |
          tauri-mcp webview-execute-js --script "document.title"
        source: 'docs/api/webview-interaction.md'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['tauri-mcp-cli']

tensions:
  - tension: '`daemon stop` vs `driver-session stop` look similar'
    resolution: '`daemon stop` kills the background process; `driver-session stop` only ends the connection'
    skills: ['tauri-mcp-cli']
  - tension: 'Console logs and mobile logs share the same read-logs command'
    resolution: 'Use explicit mobile sources (`android`, `ios`) instead of relying on the default console source'
    skills: ['tauri-mcp-cli']

dependencies: []
